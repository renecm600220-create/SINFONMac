name: Build SINFON Mac

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install transparent-background==1.3.4 torch==2.2.2 Pillow==11.2.1 numpy==1.26.4

      - name: Download model
        run: |
          mkdir -p models
          python -c "
          import os, shutil
          src = os.path.expanduser('~/.transparent-background/ckpt_base.pth')
          if os.path.isfile(src):
              shutil.copy2(src, 'models/ckpt_base.pth')
              print('Model copied:', os.path.getsize('models/ckpt_base.pth'))
          else:
              print('Model not found, trying download...')
              from transparent_background import Remover
              r = Remover(mode='base')
              if os.path.isfile(src):
                  shutil.copy2(src, 'models/ckpt_base.pth')
                  print('Model downloaded and copied')
          "

      - name: Create embedded Python
        run: |
          mkdir -p python-embed
          SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")

          # Create tarball of Python environment
          cd /opt/hostedtoolcache/Python/$PYTHON_VERSION*/x64
          tar czf /tmp/python-embed.tar.gz bin/python3 lib/python$PYTHON_VERSION include share
          mv /tmp/python-embed.tar.gz $GITHUB_WORKSPACE/python-embed/

          # Copy site-packages
          cd $SITE
          tar czf /tmp/site-packages.tar.gz .
          mv /tmp/site-packages.tar.gz $GITHUB_WORKSPACE/python-embed/

          cd $GITHUB_WORKSPACE
          echo "Python $PYTHON_VERSION embedded"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm install

      - name: Build without packaging
        run: |
          mkdir -p release
          # Create tarball with all files for Mac
          tar czf release/SINFON-Mac.tar.gz \
            --transform='s,^,SINFON/,' \
            public/ build/ scripts/ models/ python-embed/ package.json

      - name: Upload Mac package
        uses: actions/upload-artifact@v4
        with:
          name: SINFON-Mac
          path: release/SINFON-Mac.tar.gz
          retention-days: 30

      - name: Package info
        run: |
          ls -lh release/
          echo "Mac package ready"
          echo "To build DMG: run 'npm install && npm run dist:mac' on a Mac"